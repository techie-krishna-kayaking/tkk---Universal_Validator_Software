name: Web Artifacts

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the artifact (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  web-build:
    name: Build Web Deployment Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build production frontend bundle
        run: cd frontend && npm run build
        env:
          NODE_ENV: production

      - name: Package web artifact
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          tar -czf "tkk-universal-validator-web-${VERSION}.tar.gz" -C frontend dist

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ inputs.version || github.ref_name }}
          path: tkk-universal-validator-web-*.tar.gz

      - name: Attach to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tkk-universal-validator-web-*.tar.gz
          draft: true
