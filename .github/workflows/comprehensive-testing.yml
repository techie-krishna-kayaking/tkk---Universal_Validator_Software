name: Comprehensive Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: comprehensive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install poetry
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run pytest tests/unit -q --tb=short

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: ci_test_jwt_secret_key_min_32_chars
      CONFIG_ENCRYPTION_KEY: ci_test_config_encryption_key_32chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install poetry
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run pytest tests/integration -q --tb=short

  backend-security:
    name: Backend Security Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install poetry
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run pytest tests/unit/test_security_controls.py -v --tb=short
      - run: poetry run bandit -r app -c pyproject.toml -ll

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  api-e2e:
    name: API and E2E Tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: dev
      APP_DEBUG: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_ENABLED: "false"
      DATABASE_REQUIRED: "false"
      REDIS_ENABLED: "false"
      REDIS_REQUIRED: "false"
      CELERY_ENABLED: "false"
      CELERY_REQUIRED: "false"
      JWT_SECRET_KEY: ci_test_jwt_secret_key_min_32_chars
      CONFIG_ENCRYPTION_KEY: ci_test_config_encryption_key_32chars
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install backend dependencies
        run: |
          cd backend
          poetry install --no-interaction --no-ansi

      - name: Start backend
        run: |
          cd backend
          poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/openapi.json > /dev/null; then
              echo "backend ready"
              exit 0
            fi
            sleep 2
          done
          cat /tmp/backend.log
          exit 1

      - name: Set up Node for E2E
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run API contract tests
        run: |
          cd tests/e2e
          BACKEND_URL=http://localhost:8000 npx playwright test tests/api.spec.ts --reporter=list

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/e2e/test-results/

      - name: Stop backend
        if: always()
        run: |
          [[ -f /tmp/backend.pid ]] && kill "$(cat /tmp/backend.pid)" || true
