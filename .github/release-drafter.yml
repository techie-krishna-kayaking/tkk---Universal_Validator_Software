name-template: "TKK Universal Validator v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 New Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "⚡ Performance"
    labels:
      - "performance"
  - title: "🏗️ Infrastructure & DevOps"
    labels:
      - "devops"
      - "infrastructure"
      - "ci"
  - title: "🧪 Testing"
    labels:
      - "test"
      - "testing"
  - title: "📚 Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "maintenance"
      - "dependencies"

change-template: "- $TITLE (#$NUMBER by @$AUTHOR)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "breaking-change"
      - "major"
  minor:
    labels:
      - "feature"
      - "enhancement"
      - "minor"
  patch:
    labels:
      - "bug"
      - "fix"
      - "patch"
      - "security"
      - "documentation"
      - "maintenance"
      - "dependencies"
  default: patch

exclude-labels:
  - "skip-changelog"
  - "no-release-notes"

template: |
  ## What's Changed

  $CHANGES

  ---

  ### Installation

  **Web:** Deploy the web artifact tarball to your hosting environment or use the Docker image.
  **Desktop:** Download the installer for your OS from the assets below.
  **Docker:** `docker pull ghcr.io/$OWNER/tkk-universal-validator-backend:$RESOLVED_VERSION`

  **Full changelog:** $PREVIOUS_TAG...$RESOLVED_VERSION
